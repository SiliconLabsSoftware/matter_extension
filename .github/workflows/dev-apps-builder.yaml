name: Build Dev apps

on:
    pull_request:
        branches:
            - main
            - "release_*"
    schedule:
        - cron: "5 0 * * 5" # Thursday at 8:05 PM EDT
    workflow_dispatch:
        inputs:
            build-type:
                description: "standard | full"
                required: true
                type: choice
                options:
                    - standard
                    - full

# concurrency:
#     group: dev-build-examples-${{ github.ref }}
#     cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
    set-build-type:
        runs-on: ubuntu-latest
        outputs:
            build-type: ${{ steps.set-build-type.outputs.build-type }}
        steps:
            - name: Set build-type based on event
              id: set-build-type
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                      echo "build-type=${{ github.event.inputs.build-type }}" >> $GITHUB_OUTPUT
                  elif [[ "${{ github.event_name }}" == "schedule" ]]; then
                      echo "build-type=full" >> $GITHUB_OUTPUT
                  elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "feature/coverage-ci" ]]; then
                      echo "build-type=full" >> $GITHUB_OUTPUT
                  elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
                      if [[ "${{ github.head_ref }}" == "feature/coverage-ci" ]]; then
                          echo "build-type=full" >> $GITHUB_OUTPUT
                      else
                          echo "build-type=standard" >> $GITHUB_OUTPUT
                      fi
                  fi

    cache-tools:
        runs-on: ubuntu-latest
        needs: [set-build-type]
        permissions:
            contents: read
            actions: write
        outputs:
            cache-key: ${{ steps.cache-tools.outputs.cache-key }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - uses: ./.github/actions/cache-tools
              id: cache-tools

    build_lighting_app:
        name: Build Lighting App
        needs: [set-build-type, cache-tools]
        uses: ./.github/workflows/platform-builder.yaml
        with:
            example-app: "lighting_app"
            build-type: ${{ needs.set-build-type.outputs.build-type }}
            trustzone-support: true

    # TEMPORARY: platform jobs through build-sqa-tools are commented for a quick CI pass.
    # Restore those jobs and the full merge-apps `needs` list when done.

