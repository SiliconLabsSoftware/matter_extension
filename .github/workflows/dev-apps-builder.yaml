# TEMP CI shortcut:     build-sqa-tools:
# TEMP CI shortcut:         name: Build SQA Tools
# TEMP CI shortcut:         needs: [set-build-type, cache-tools]
# TEMP CI shortcut:         uses: ./.github/workflows/sqa-tools-builder.yaml
# TEMP CI shortcut:         with:
# TEMP CI shortcut:             build-type: ${{ needs.set-build-type.outputs.build-type }}

    merge-apps:
        name: Merge App Artifacts
        runs-on: ubuntu-latest
        needs:
            # TEMP: trimmed needs while jobs below are commented (restore with jobs)
            - set-build-type
            - cache-tools
            - build_lighting_app
        if: ${{ success() }}

        steps:
            - name: Merge artifacts
              uses: actions/upload-artifact/merge@v7
              with:
                  name: "dev-artifacts-${{ needs.set-build-type.outputs.build-type }}"
                  delete-merged: true
                  pattern: "*-${{ needs.set-build-type.outputs.build-type }}"

    build_coverage:
        name: Build Coverage (lcov)
        needs:
            - set-build-type
        if: >-
            ${{ (needs.set-build-type.outputs.build-type == 'standard' || needs.set-build-type.outputs.build-type == 'full')
                && (github.ref_name == 'main' || startsWith(github.ref_name, 'release_')
                    || github.ref_name == 'feature/coverage-ci' || github.head_ref == 'feature/coverage-ci') }}
        uses: ./.github/workflows/coverage-builder.yaml
        with:
            build-type: ${{ needs.set-build-type.outputs.build-type }}

    wait-for-test-results:
        name: Wait for Test Results
        needs: merge-apps, build_coverage
        if: always()
        uses: ./.github/workflows/sqa-sanity-tests.yaml
        secrets:
            SILABSSW_MATTER_CI_BOT_APP_PRIVATE_KEY: ${{ secrets.SILABSSW_MATTER_CI_BOT_APP_PRIVATE_KEY }}

    build-sqa-apps:
        name: Build SQA apps
        needs: wait-for-test-results
        if: ${{ github.ref_name == 'main' || startsWith(github.ref_name, 'release_') || startsWith(github.ref_name, 'SL_compatibility') }}
        permissions:
            contents: read
            actions: write
        uses: ./.github/workflows/sqa-apps-builder.yaml

    delete-cache:
        name: Delete tools cache
        needs: [set-build-type, build-sqa-apps, cache-tools]
        if: always()
        runs-on: ubuntu-latest
        permissions:
            actions: write
        steps:
            - name: Delete tools cache
              run: |
                curl -s -X DELETE \
                  -H "Accept: application/vnd.github+json" \
                  -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  "https://api.github.com/repos/${{ github.repository }}/actions/caches?key=${{ needs.cache-tools.outputs.cache-key }}"
