name: build-linux-tools

on:
    workflow_call:

jobs:
  bootstrap_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      
      - name: Checkout matter_sdk submodules
        run: |
          cd third_party/matter_sdk
          ./scripts/checkout_submodules.py --shallow --recursive --platform silabs_docker
          cd ../..
        uses: ./.github/actions/checkout-submodules-and-bootstrap
        with:
          platform: silabs_docker

      - name: Run bootstrap action
        uses: SiliconLabsSoftware/matter_build_action/bootstrap@main
        with:
          platform: linux