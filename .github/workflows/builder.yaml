name: Common Builder

on:
    workflow_call:
        inputs:
            json-file-path:
                required: true
                type: string
            path-to-example-app:
                required: true
                type: string
            example-app:
                required: true
                type: string
            build-type:
                required: true
                type: string
            platform:
                required: true
                type: string

jobs:
    build:
        name: ${{ inputs.platform }}-build-job
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  submodules: "true"
            - name: Compute cache key
              id: compute-cache-key
              run: |
                  ZAP_VERSION=$(python3 slc/script/get_zap_version.py --docker)
                  HASH=$(echo -n "${ZAP_VERSION}" | sha256sum | awk '{print $1}')
                  echo "cache-key=zap-slt-tools-${{ runner.os }}-${{ runner.arch }}-${HASH}" >> $GITHUB_OUTPUT
            - name: Restore ZAP and SLT tools cache
              id: cache
              uses: actions/cache@v4
              with:
                  path: |
                      /tmp/zap-linux-x64
                      /home/runner/.silabs/slt
                      /home/runner/.local/bin/slt
                  key: ${{ steps.compute-cache-key.outputs.cache-key }}
            - name: Set env and paths from cache
              if: steps.cache.outputs.cache-hit == 'true'
              shell: bash
              run: |
                  echo "CONAN_HOME=/home/runner/.silabs/slt/installs/conan" >> $GITHUB_ENV
                  echo "STUDIO_ADAPTER_PACK_PATH=/tmp/zap-linux-x64" >> $GITHUB_ENV
                  echo "SLT_PATH=/home/runner/.local/bin/slt" >> $GITHUB_ENV
                  echo "/tmp/zap-linux-x64" >> $GITHUB_PATH
                  echo "/home/runner/.local/bin/slt" >> $GITHUB_PATH
                  SLC_CLI_PATH=$(slt where slc-cli)
                  JAVA_HOME=$(slt where java21)
                  COMMANDER_PATH=$(slt where commander)
                  ARM_GCC_DIR=$(slt where gcc-arm-none-eabi)
                  echo "SLC_CLI_PATH=$SLC_CLI_PATH" >> $GITHUB_ENV
                  echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
                  echo "COMMANDER_PATH=$COMMANDER_PATH" >> $GITHUB_ENV
                  echo "ARM_GCC_DIR=$ARM_GCC_DIR" >> $GITHUB_ENV
                  echo "$SLC_CLI_PATH" >> $GITHUB_PATH
                  if [ -n "$JAVA_HOME" ]; then
                    echo "$JAVA_HOME/jre/bin" >> $GITHUB_PATH
                  fi
                  echo "$COMMANDER_PATH" >> $GITHUB_PATH
                  echo "$ARM_GCC_DIR/bin" >> $GITHUB_PATH
            - name: Install tools
              if: steps.cache.outputs.cache-hit != 'true'
              uses: ./.github/actions/install-tools
            - name: Build ${{ inputs.example-app }}
              uses: SiliconLabsSoftware/matter_build_action@v2.0.0
              continue-on-error: ${{ inputs.build-type == 'custom-sqa' }}
              with:
                  json-file-path: ${{ inputs.json-file-path }}
                  path-to-example-app: ${{ inputs.path-to-example-app }}
                  example-app: ${{ inputs.example-app }}
                  build-script: "./slc/build.sh"
                  output-directory: " "
                  build-type: ${{ inputs.build-type }}

            - name: Create asset files
              if: startsWith(github.ref_name, 'release_')
              run: |
                  find out -type f \( -name "*.s37" -o -name "*.rps" \) | while read file; do
                      echo '<?xml version="1.0" encoding="UTF-8"?>' > "${file}.asset"
                      echo '<asset/>' >> "${file}.asset"
                      echo "Created ${file}.asset"
                  done

            - name: Upload artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ inputs.example-app }}-${{inputs.platform}}-${{ inputs.build-type }}
                  path: |
                      out/*/*/artifact/**
                      ${{ inputs.build-type == 'custom-sqa' && 'out/*/*/*/artifact/**' || '' }}
                      ${{ inputs.platform == 'sixg301' && 'out/*/*/*/artifact/**' || '' }}
                      ${{ inputs.platform == 'sixg301' && inputs.build-type != 'custom-sqa' && 'out/**/build/debug/*.out' || '' }}
                      ${{ inputs.platform == 'sixg301' && inputs.build-type != 'custom-sqa' && 'out/**/build/debug/*.map' || '' }}
                      ${{ inputs.build-type != 'custom-sqa' && 'out/brd4187c/**/build/debug/*.map' || '' }}
                      ${{ inputs.build-type != 'custom-sqa' && 'out/brd4338a/**/build/debug/*.map' || '' }}
                      !out/**/*-bootloader/build/debug/*.map
                      !out/**/*-bootloader/build/debug/*.out
                      !out/**/*-copy-sources/**
                  if-no-files-found: warn
                  overwrite: true
