name: Sanity Tests Dispatch

on:
    issue_comment:
        types: [created]

jobs:
    verify:
        name: Verify and Authorize
        runs-on: ubuntu-latest
        # Only act on PR comments containing the slash command
        if: |
            github.event.issue.pull_request != null &&
            contains(github.event.comment.body, '/run-sanity')
        outputs:
            head-sha: ${{ steps.pr_details.outputs.head_sha }}
        steps:
            - name: Generate GitHub App Token
              id: generate_app_token
              uses: actions/create-github-app-token@v3
              with:
                  app-id: ${{ vars.SILABSSW_MATTER_CI_BOT_APP_ID }}
                  private-key: ${{ secrets.SILABSSW_MATTER_CI_BOT_APP_PRIVATE_KEY }}

            - name: Mask the generated token
              run: echo "::add-mask::${{ steps.generate_app_token.outputs.token }}"

            - name: Verify permission and get PR details
              id: pr_details
              uses: actions/github-script@v8
              with:
                  github-token: ${{ steps.generate_app_token.outputs.token }}
                  script: |
                      async function postComment(body) {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: context.issue.number,
                              body,
                          });
                      }

                      const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          username: context.actor,
                      });
                      if (!['write', 'maintain', 'admin'].includes(perm.permission)) {
                          await postComment(
                              `\`/run-sanity\` failed: **${context.actor}** does not have write access to this repository. ` +
                              'Only members with write or admin access can trigger sanity tests.'
                          );
                          core.setFailed(`${context.actor} does not have write access to this repository.`);
                          return;
                      }
                      core.info(`${context.actor} permission: ${perm.permission}`);

                      const { data: pr } = await github.rest.pulls.get({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          pull_number: context.issue.number,
                      });
                      if (pr.state !== 'open') {
                          await postComment('`/run-sanity` failed: sanity tests cannot be triggered on a closed PR.');
                          core.setFailed('This PR is not open.');
                          return;
                      }
                      if (pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`) {
                          await postComment(
                              '`/run-sanity` is only needed for fork PRs. ' +
                              'Sanity tests run automatically for internal PRs via the build pipeline.'
                          );
                          core.setFailed('This PR is not from a fork. Sanity tests run automatically for internal PRs.');
                          return;
                      }
                      core.setOutput('head_sha', pr.head.sha);
                      core.info(`PR #${context.issue.number} head SHA: ${pr.head.sha}`);

            - name: Verify build succeeded
              uses: actions/github-script@v8
              with:
                  github-token: ${{ steps.generate_app_token.outputs.token }}
                  script: |
                      const headSha = '${{ steps.pr_details.outputs.head_sha }}';
                      const { data } = await github.rest.actions.listWorkflowRuns({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          workflow_id: 'dev-apps-builder.yaml',
                          head_sha: headSha,
                      });
                      const successRun = data.workflow_runs.find(r => r.conclusion === 'success');
                      if (!successRun) {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: context.issue.number,
                              body: [
                                  '`/run-sanity` failed: no successful build found for this commit.',
                                  '',
                                  'The `dev-apps-builder` run must complete successfully before sanity tests can be triggered.',
                                  'Once it does, comment `/run-sanity` again.',
                              ].join('\n'),
                          });
                          core.setFailed(
                              'No successful dev-apps-builder run found for this commit. ' +
                              'Wait for the build to complete, then comment /run-sanity again.'
                          );
                          return;
                      }
                      core.info(`Found successful build run: ${successRun.id} (#${successRun.run_number})`);

    run-sanity:
        name: Wait for Test Results
        needs: verify
        uses: ./.github/workflows/sqa-sanity-tests.yaml
        with:
            head-sha: ${{ needs.verify.outputs.head-sha }}
        secrets:
            SILABSSW_MATTER_CI_BOT_APP_PRIVATE_KEY: ${{ secrets.SILABSSW_MATTER_CI_BOT_APP_PRIVATE_KEY }}
