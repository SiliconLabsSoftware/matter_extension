name: Build SQA apps

on:
    workflow_call:

jobs:
    cache-tools:
        runs-on: ubuntu-latest
        outputs:
            cache-key: ${{ steps.set-cache-key.outputs.cache-key }}
        steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  submodules: "true"
            - name: Install tools
              uses: ./.github/actions/install-tools
            - name: Set cache key
              id: set-cache-key
              run: |
                  ZAP_VERSION=$(python3 slc/script/get_zap_version.py --docker)
                  HASH=$(echo -n "${ZAP_VERSION}" | sha256sum | awk '{print $1}')
                  echo "cache-key=zap-slt-tools-${{ runner.os }}-${{ runner.arch }}-${HASH}" >> $GITHUB_OUTPUT
            - name: Save ZAP and SLT tools cache
              uses: actions/cache/save@v4
              with:
                  path: |
                      /tmp/zap-linux-x64
                      /home/runner/.silabs/slt
                      /home/runner/.local/bin/slt
                  key: ${{ steps.set-cache-key.outputs.cache-key }}

    build-lock-app:
        name: Build Lock App
        needs: cache-tools
        uses: ./.github/workflows/platform-builder.yaml
        with:
            example-app: "lock-app"
            build-type: "custom-sqa"
            ncp-917-support: true
            mg24-internal-support: false
            mgm24-internal-support: false
            mg26-internal-support: false
            mgm26-internal-support: false

    build-lighting-app:
        name: Build Lighting App
        needs: cache-tools
        uses: ./.github/workflows/platform-builder.yaml
        with:
            example-app: "lighting-app"
            build-type: "custom-sqa"
            mg24-internal-support: false
            mgm24-internal-support: false
            mg26-internal-support: false
            mgm26-internal-support: false

    build-window-app:
        name: Build Window App
        needs: cache-tools
        uses: ./.github/workflows/platform-builder.yaml
        with:
            example-app: "window-app"
            build-type: "custom-sqa"
            mg24-support: false
            mg24-internal-support: false
            mgm24-support: false
            mg26-support: false
            mg26-internal-support: false
            mgm26-internal-support: false
            wifi-soc-support: false
            sixg301-support: false

    #  build-dishwasher-app:
    #      name: Build Dishwasher App
    #      needs: cache-tools
    #      uses: ./.github/workflows/platform-builder.yaml
    #      with:
    #          example-app: "dishwasher-app"
    #          build-type: "custom-sqa"
    #          mg24-support: false
    #          mg24-internal-support: false
    #          mgm24-support: false
    #          mgm24-internal-support: false
    #          mg26-support: false
    #          mg26-internal-support: false
    #          mgm26-internal-support: false
    #          wifi-soc-support: false
    #          sixg301-support: false

    build-thermostat:
        name: Build Thermostat
        needs: cache-tools
        uses: ./.github/workflows/platform-builder.yaml
        with:
            example-app: "thermostat"
            build-type: "custom-sqa"
            mg24-support: false
            mg24-internal-support: false
            mgm24-support: false
            mgm24-internal-support: false
            mg26-support: false
            mg26-internal-support: false
            mgm26-internal-support: false
            wifi-soc-support: false
            sixg301-support: false

    build-light-switch-app:
        name: Build Light Switch App
        needs: cache-tools
        uses: ./.github/workflows/platform-builder.yaml
        with:
            example-app: "light-switch-app"
            build-type: "custom-sqa"
            mg24-internal-support: false
            mgm24-support: false
            mgm24-internal-support: false
            mg26-internal-support: false
            mgm26-internal-support: false

    build-multi-sensor-app:
        name: Build Multi Sensor App
        needs: cache-tools
        uses: ./.github/workflows/platform-builder.yaml
        with:
            example-app: "multi-sensor-app"
            build-type: "custom-sqa"
            mg24-internal-support: false
            mgm24-support: false
            mgm24-internal-support: false
            mg26-support: false
            mg26-internal-support: false
            mgm26-internal-support: false
            sixg301-support: false

    build-zigbee-matter-light:
        name: Build Zigbee Matter Light
        needs: cache-tools
        uses: ./.github/workflows/platform-builder.yaml
        with:
            example-app: "zigbee-matter-light"
            build-type: "custom-sqa"
            mg24-support: false
            mg24-internal-support: false
            mgm24-support: false
            mgm24-internal-support: false
            mg26-internal-support: false
            mgm26-internal-support: false
            wifi-soc-support: false

    build-closure-app:
        name: Build Closure App
        needs: cache-tools
        uses: ./.github/workflows/platform-builder.yaml
        with:
            example-app: "closure-app"
            build-type: "custom-sqa"
            mg24-internal-support: false
            mgm24-support: false
            mgm24-internal-support: false
            mg26-internal-support: false
            mgm26-internal-support: false

    build-platform-template:
        name: Build Platform App
        needs: cache-tools
        uses: ./.github/workflows/platform-builder.yaml
        with:
            example-app: "platform-template"
            build-type: "custom-sqa"
            mg24-internal-support: false
            mgm24-support: false
            mgm24-internal-support: false
            mg26-internal-support: false
            mgm26-internal-support: false

    merge-apps:
        name: Merge SQA App Artifacts
        runs-on: ubuntu-latest
        needs:
            - cache-tools
            - build-lock-app
            - build-lighting-app
            - build-window-app
            # - build-dishwasher-app
            - build-thermostat
            - build-light-switch-app
            - build-multi-sensor-app
            - build-zigbee-matter-light
            - build-closure-app
            - build-platform-template
        if: always()

        steps:
            - name: Merge artifacts
              uses: actions/upload-artifact/merge@v7
              with:
                  name: "sqa-artifacts"
                  delete-merged: true
                  pattern: "*-custom-sqa"

    delete-cache:
        name: Delete tools cache
        needs: [merge-apps, cache-tools]
        runs-on: ubuntu-latest
        permissions:
            actions: write
        steps:
            - name: Delete tools cache
              run: |
                curl -s -X DELETE \
                  -H "Accept: application/vnd.github+json" \
                  -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  "https://api.github.com/repos/${{ github.repository }}/actions/caches?key=${{ needs.cache-tools.outputs.cache-key }}"
