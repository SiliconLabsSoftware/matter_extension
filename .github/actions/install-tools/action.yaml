name: Install Tools
description: Install required tools and set environment variables.

runs:
  using: "composite"
  steps:
    - name: Set CONAN_HOME
      shell: bash
      run: |
        echo "CONAN_HOME=~/.silabs/slt/installs/conan" >> $GITHUB_ENV

    - name: Install ZAP
      shell: bash
      run: |
        ZAP_VERSION=$(python3 slc/script/get_zap_version.py --docker)
        wget "https://github.com/project-chip/zap/releases/download/${ZAP_VERSION}/zap-linux-x64.zip"
        unzip zap-linux-x64.zip -d /tmp/zap-linux-x64
        rm zap-linux-x64.zip
    
    - name: Setup SLT
      id: setup-action
      uses: SiliconLabsSoftware/action-setup-slt@v1
    
    - name: Set Environment Variables
      shell: bash
      run: |
        echo "STUDIO_ADAPTER_PACK_PATH=/tmp/zap-linux-x64" >> $GITHUB_ENV
        echo "SLT_PATH=${{ steps.setup-action.outputs.slt-path }}" >> $GITHUB_ENV
        echo "/tmp/zap-linux-x64" >> $GITHUB_PATH
        echo "${{ steps.setup-action.outputs.slt-path }}" >> $GITHUB_PATH
    
    - name: Update SLT
      shell: bash
      run: |
        slt update --self
    
    - name: Install slc-cli
      shell: bash
      run: |
        MAX_ATTEMPTS=3
        RETRY_DELAY=30
        
        for attempt in $(seq 1 $MAX_ATTEMPTS); do
          echo "Attempt $attempt of $MAX_ATTEMPTS..."
          if slt install slc-cli; then
            echo "Successfully installed slc-cli"
            exit 0
          fi
          
          if [ $attempt -lt $MAX_ATTEMPTS ]; then
            echo "Failed. Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          fi
        done
        
        echo "Failed to install slc-cli after $MAX_ATTEMPTS attempts"
        exit 1
    
    - name: Set Environment Variables
      shell: bash
      run: |
        SLC_CLI_PATH=$(slt where slc-cli)
        echo "SLC_CLI_PATH=$SLC_CLI_PATH" >> $GITHUB_ENV
        JAVA_HOME=$(slt where java21)
        echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
        echo "$SLC_CLI_PATH" >> $GITHUB_PATH
        if [ -n "$JAVA_HOME" ]; then
          echo "$JAVA_HOME/jre/bin" >> $GITHUB_PATH
        fi
    
    - name: Install commander
      shell: bash
      run: |
        slt install commander
        COMMANDER_PATH=$(slt where commander)
        echo "COMMANDER_PATH=$COMMANDER_PATH" >> $GITHUB_ENV
        echo "$COMMANDER_PATH" >> $GITHUB_PATH
    
    - name: install gcc-arm-none-eabi
      shell: bash
      run: |
        set -euo pipefail
        TOOLCHAIN_VER=14.2.rel1
        case "$(uname -m)" in
          x86_64) HOST_TAG=x86_64 ;;
          aarch64) HOST_TAG=aarch64 ;;
          *) echo "Unsupported host architecture: $(uname -m)"; exit 1 ;;
        esac
        ARCHIVE="arm-gnu-toolchain-${TOOLCHAIN_VER}-${HOST_TAG}-arm-none-eabi.tar.xz"
        URL="https://developer.arm.com/-/media/Files/downloads/gnu/${TOOLCHAIN_VER}/binrel/${ARCHIVE}"
        INSTALL_ROOT="${HOME}/.local"
        EXTRACTED_NAME="arm-gnu-toolchain-${TOOLCHAIN_VER}-${HOST_TAG}-arm-none-eabi"
        DEST_NAME="arm-gnu-toolchain-${TOOLCHAIN_VER}-arm-none-eabi"
        ARM_GCC_DIR="${INSTALL_ROOT}/${DEST_NAME}"

        mkdir -p "${INSTALL_ROOT}"
        if [ -x "${ARM_GCC_DIR}/bin/arm-none-eabi-gcc" ]; then
          echo "Toolchain already present at ${ARM_GCC_DIR}"
        else
          rm -rf "${ARM_GCC_DIR}"
          curl -fsSL -o "/tmp/${ARCHIVE}" "${URL}"
          tar -xJf "/tmp/${ARCHIVE}" -C "${INSTALL_ROOT}"
          rm -f "/tmp/${ARCHIVE}"
          mv "${INSTALL_ROOT}/${EXTRACTED_NAME}" "${ARM_GCC_DIR}"
        fi

        echo "ARM_GCC_DIR=${ARM_GCC_DIR}" >> $GITHUB_ENV
        echo "${ARM_GCC_DIR}/bin" >> $GITHUB_PATH