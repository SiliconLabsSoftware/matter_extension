# SonarQube project: https://sonarqube.silabs.net/dashboard?id=unify_matter_pc
# Coverage data is generated by .github/workflows/coverage-lcov-builder.yaml
# (host-side unit tests of third_party/matter_sdk via scripts/build_coverage.sh)
# and downloaded by jenkins_integration/artifacts/download_coverage_artifact.py.
#
# The Jenkins 'Code Coverage' stage converts downloaded LCOV to SonarQube XML via gcovr
# (see Jenkinsfile) and passes it to sonar-scanner.

sonar.projectKey=unify_matter_pc
sonar.host.url=https://sonarqube.silabs.net

sonar.language=c++
sonar.sourceEncoding=UTF-8

# Coverage scope: matter_sdk source tree exercised by build_coverage.sh
sonar.sources=third_party/matter_sdk/src

# Generic coverage report produced by gcovr --sonarqube on Jenkins
sonar.coverageReportPaths=coverage/sonarqube-coverage.xml

# Exclude unit tests and generated code from analysis and coverage
sonar.exclusions=third_party/matter_sdk/src/**/tests/**,third_party/matter_sdk/src/**/*_test.cpp,third_party/matter_sdk/src/**/*_test.h,third_party/matter_sdk/src/**/zap-generated/**
sonar.coverage.exclusions=third_party/matter_sdk/src/**/tests/**,third_party/matter_sdk/src/**/*_test.cpp,third_party/matter_sdk/src/**/zap-generated/**
