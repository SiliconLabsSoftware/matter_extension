# SonarQube project: https://sonarqube.silabs.net/dashboard?id=unify_matter_pc
# Coverage is built in .github/workflows/coverage-builder.yaml (build_coverage.sh),
# converted to sonarqube-coverage.xml there via gcovr --sonarqube, and downloaded
# by jenkins_integration/artifacts/download_coverage_artifact.py for sonar-scanner on Jenkins.

sonar.projectKey=unify_matter_pc
sonar.host.url=https://sonarqube.silabs.net

sonar.language=c++
sonar.sourceEncoding=UTF-8

# Silabs platform port + Matter cluster implementations (comma-separated). Use third_party/matter_sdk/src for full SDK.
sonar.sources=third_party/matter_sdk/src/platform/silabs,third_party/matter_sdk/src/app/clusters

# Generic coverage report produced by gcovr --sonarqube in GitHub Actions
sonar.coverageReportPaths=coverage/sonarqube-coverage.xml

# Exclusions per indexed root (Java/Kotlin excluded without binaries)
sonar.exclusions=third_party/matter_sdk/src/platform/silabs/**/tests/**,third_party/matter_sdk/src/platform/silabs/**/*_test.cpp,third_party/matter_sdk/src/platform/silabs/**/*_test.h,third_party/matter_sdk/src/platform/silabs/**/zap-generated/**,third_party/matter_sdk/src/platform/silabs/**/third_party/**,third_party/matter_sdk/src/platform/silabs/**/*.java,third_party/matter_sdk/src/platform/silabs/**/*.kt,third_party/matter_sdk/src/app/clusters/**/tests/**,third_party/matter_sdk/src/app/clusters/**/*_test.cpp,third_party/matter_sdk/src/app/clusters/**/*_test.h,third_party/matter_sdk/src/app/clusters/**/zap-generated/**,third_party/matter_sdk/src/app/clusters/**/third_party/**,third_party/matter_sdk/src/app/clusters/**/*.java,third_party/matter_sdk/src/app/clusters/**/*.kt
sonar.coverage.exclusions=third_party/matter_sdk/src/platform/silabs/**/tests/**,third_party/matter_sdk/src/platform/silabs/**/*_test.cpp,third_party/matter_sdk/src/platform/silabs/**/zap-generated/**,third_party/matter_sdk/src/platform/silabs/**/third_party/**,third_party/matter_sdk/src/app/clusters/**/tests/**,third_party/matter_sdk/src/app/clusters/**/*_test.cpp,third_party/matter_sdk/src/app/clusters/**/zap-generated/**,third_party/matter_sdk/src/app/clusters/**/third_party/**
