# SonarQube project: https://sonarqube.silabs.net/dashboard?id=unify_matter_pc
# Coverage is built in .github/workflows/coverage-builder.yaml (build_coverage.sh),
# converted to sonarqube-coverage.xml there via gcovr --sonarqube, and downloaded
# by jenkins_integration/artifacts/download_coverage_artifact.py for sonar-scanner on Jenkins.

sonar.projectKey=unify_matter_pc
sonar.host.url=https://sonarqube.silabs.net

sonar.language=c++
sonar.sourceEncoding=UTF-8

# Narrow scope (faster test scans): Silabs platform port only. Use third_party/matter_sdk/src for full SDK.
sonar.sources=third_party/matter_sdk/app/clusters

# Generic coverage report produced by gcovr --sonarqube in GitHub Actions
sonar.coverageReportPaths=coverage/sonarqube-coverage.xml

# Exclusions relative to indexed tree under platform/silabs
sonar.exclusions=third_party/matter_sdk/src/platform/silabs/**/tests/**,third_party/matter_sdk/src/platform/silabs/**/*_test.cpp,third_party/matter_sdk/src/platform/silabs/**/*_test.h,third_party/matter_sdk/src/platform/silabs/**/zap-generated/**,third_party/matter_sdk/src/platform/silabs/**/third_party/**,third_party/matter_sdk/src/platform/silabs/**/*.java,third_party/matter_sdk/src/platform/silabs/**/*.kt
sonar.coverage.exclusions=third_party/matter_sdk/src/platform/silabs/**/tests/**,third_party/matter_sdk/src/platform/silabs/**/*_test.cpp,third_party/matter_sdk/src/platform/silabs/**/zap-generated/**,third_party/matter_sdk/src/platform/silabs/**/third_party/**
