# SonarQube project: https://sonarqube.silabs.net/dashboard?id=unify_matter_pc
# Coverage is built in .github/workflows/coverage-builder.yaml (build_coverage.sh),
# converted to sonarqube-coverage.xml there via gcovr --sonarqube, and downloaded
# by jenkins_integration/artifacts/download_coverage_artifact.py for sonar-scanner on Jenkins.

sonar.projectKey=github_matter_sdk
sonar.host.url=https://sonarqube.silabs.net

sonar.language=c++
sonar.sourceEncoding=UTF-8

sonar.sources=third_party/matter_sdk/src/,third_party/matter_sdk/examples/

sonar.inclusions=**/*.cpp,**/*.h,**/*.c

sonar.coverageReportPaths=coverage/sonarqube-coverage.xml

sonar.exclusions=third_party/matter_sdk/**/tests/**,third_party/matter_sdk/**/zap-generated/**,third_party/matter_sdk/**/third_party/**,third_party/matter_sdk/**/out/**,third_party/matter_sdk/**/*.java,third_party/matter_sdk/**/*.kt,third_party/matter_sdk/**/*.json,third_party/matter_sdk/**/*.a,third_party/matter_sdk/**/*.xml,third_party/matter_sdk/**/*.js,third_party/matter_sdk/**/*.ts

sonar.coverage.exclusions=third_party/matter_sdk/**/zzz_generated/**,third_party/matter_sdk/**/third_party/**,third_party/matter_sdk/**/tests/**,third_party/matter_sdk/**/testing/**
