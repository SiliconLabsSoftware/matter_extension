# SonarQube project: https://sonarqube.silabs.net/dashboard?id=unify_matter_pc
# Coverage is built in .github/workflows/coverage-builder.yaml (build_coverage.sh),
# converted to sonarqube-coverage.xml there via gcovr --sonarqube, and downloaded
# by jenkins_integration/artifacts/download_coverage_artifact.py for sonar-scanner on Jenkins.

sonar.projectKey=unify_matter_pc
sonar.host.url=https://sonarqube.silabs.net

sonar.language=c++
sonar.sourceEncoding=UTF-8

# Coverage scope: matter_sdk source tree exercised by build_coverage.sh
sonar.sources=third_party/matter_sdk/src

# Generic coverage report produced by gcovr --sonarqube in GitHub Actions
sonar.coverageReportPaths=coverage/sonarqube-coverage.xml

# Exclude unit tests, generated code, vendored trees under src, and Java (SDK .java needs binaries for Java sensor).
sonar.exclusions=third_party/matter_sdk/src/**/tests/**,third_party/matter_sdk/src/**/*_test.cpp,third_party/matter_sdk/src/**/*_test.h,third_party/matter_sdk/src/**/zap-generated/**,third_party/matter_sdk/src/**/third_party/**,third_party/matter_sdk/src/**/*.java
sonar.coverage.exclusions=third_party/matter_sdk/src/**/tests/**,third_party/matter_sdk/src/**/*_test.cpp,third_party/matter_sdk/src/**/zap-generated/**,third_party/matter_sdk/src/**/third_party/**
